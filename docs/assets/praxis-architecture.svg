  <ellipse cx="982.5" cy="925" rx="132.5" ry="32" fill="#eef2ff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="982.5" y="932" text-anchor="middle" class="node-title">Incident memory</text>
  <text x="982.5" y="976" text-anchor="middle" class="node-copy">Tablestore vector search</text>
