  <text x="310" y="145" class="group-title">Alibaba Cloud</text>
  <rect x="315" y="165" width="835" height="710" rx="22" fill="#ffffff" fill-opacity=".62" stroke="#fdba74" class="group"/>
  <text x="345" y="200" class="group-title">Function Compute 3.0 — Python 3.10 + FastAPI controller</text>

  <rect x="1470" y="110" width="290" height="580" rx="26" fill="url(#qwen-fill)" stroke="#818cf8" class="group"/>
  <text x="1500" y="145" class="group-title">Qwen-only model routing</text>

