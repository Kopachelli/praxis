<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Praxis alert-to-remediation architecture</title>
  <desc id="desc">A logical summary of the Praxis Qwen and Alibaba architecture. A monitoring alert enters a signed webhook on Function Compute. A Qwen-only agent triages it, creates a remediation plan, and requires an approval record before the safe executor can restart an isolated target. The current demo caller is unauthenticated; runtime hardening remains proposed in ADR-024–028, and least-privilege recorder access remains proposed in ADR-029.</desc>
  <metadata><![CDATA[
flowchart LR
    subgraph Sources
        A[Sentry / Uptime / CI / Cloud alarms]
    end

    subgraph AlibabaCloud["Alibaba Cloud (deployment proof)"]
        subgraph FC["Function Compute 3.0 — FastAPI web function"]
            W["/webhook<br/>256 KiB ingress gate · HMAC verify · normalize · process-local dedup"]
            SM["Incident state machine<br/>NEW→TRIAGED→AWAITING_APPROVAL→EXECUTING→RESOLVED"]
            AG["Agent core<br/>thinking-mode triage · tool calling · plan JSON"]
            EX["Executor<br/>real safe tool + labeled dry-runs"]
            TR["Decision trail<br/>thoughts · tool calls · approvals · routing outcomes"]
            UI["ui/index.html<br/>timeline + Approve/Reject"]
        end
        DT["praxis-demo-target<br/>isolated disposable FC function"]
        TS[("Tablestore<br/>vector index 1024-d<br/>KnnVectorQuery")]
    end

    subgraph QwenCloud["Qwen Cloud (Model Studio)"]
        M1x["PRIMARY: qwen3.7-max (M0 verified)<br/>fallback: qwen3-max → qwen-plus"]
        M2x["FAST: qwen-flash"]
        EMB["text-embedding-v4 (1024-d)"]
    end

    subgraph OpenRouter["OpenRouter (same-Qwen fallback only)"]
        OR["PRIMARY: qwen/qwen3.7-max<br/>→ qwen/qwen3-max → qwen/qwen-plus<br/>FAST: qwen/qwen3.6-flash"]
    end

    H((Demo owner<br/>intended approver))
    LIM["Current runtime limits<br/>ADR-024–028 proposed · M4 live proof pending<br/>Recorder access: ADR-029 proposed"]

    A -->|POST /webhook| W --> SM --> AG
    AG <-->|chat/completions + tools| M1x
    AG <-->|classification| M2x
    AG -.->|ADR-008/013 bounded fallback after eligible failure| OR
    AG -->|plan| SM
    SM -->|AWAITING_APPROVAL| UI --> H
    H -->|approval record; v1 caller unauthenticated| SM -->|approved plan only| EX
    H -->|UI reject / API edit correction| SM
    SM -.->|regenerate corrected plan| AG
    EX -->|exact-allowlisted real restart| DT -->|new boot identity| EX
    EX -->|results| TR
    AG -->|thoughts/tool calls| TR
    SM -->|post-resolve: attempt embed + write| EMB --> TS
    AG <-->|KnnVectorQuery recall| TS
    LIM -.-> SM
  ]]></metadata>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="cloud-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#fffbeb"/>
    </linearGradient>
    <linearGradient id="qwen-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 30px Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .limitation { font: 600 13px Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #9a3412; }
      .group-title { font: 700 17px Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; letter-spacing: .3px; }
      .node-title { font: 700 16px Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f172a; }
      .node-copy { font: 400 14px Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334155; }
      .edge-label { font: 600 12px Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #475569; }
      .group { stroke-width: 2; }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; filter: url(#shadow); }
      .qwen-node { fill: url(#qwen-fill); stroke: #818cf8; stroke-width: 2; filter: url(#shadow); }
      .safety-node { fill: #ecfdf5; stroke: #10b981; stroke-width: 3; filter: url(#shadow); }
      .edge { fill: none; stroke: #475569; stroke-width: 2.2; marker-end: url(#arrow); }
      .edge-both { fill: none; stroke: #475569; stroke-width: 2.2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .edge-dashed { fill: none; stroke: #6366f1; stroke-width: 2.2; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .audit-edge { fill: none; stroke: #94a3b8; stroke-width: 1.8; marker-end: url(#arrow); }
      .label-bg { fill: #f8fafc; opacity: .96; }
    </style>
  </defs>

  <rect width="1800" height="1120" fill="url(#bg)"/>
  <text x="48" y="52" class="title">Praxis — Alert-to-Remediation Autopilot</text>
  <text x="48" y="80" class="subtitle">Qwen-only reasoning · approval-record gate · auditable execution · Alibaba Cloud deployment</text>
  <text x="48" y="101" class="limitation">Logical design summary · runtime ADR-024–028 proposed · recorder ADR-029 proposed · M4 live write/recall proof pending</text>

